version: "3.9"

services:

  # ── Evolution API (WhatsApp Open Source) ────────────────────
  evolution_api:
    image: atendai/evolution-api:latest
    container_name: evolution_api_face_mvp
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    environment:
      # Chave global da API (deve bater com evolution_api_key no config.py)
      AUTHENTICATION_API_KEY: "B6D711FCDE4D4FD5936544120E713976"
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"

      # Configurações de armazenamento
      DATABASE_ENABLED: "false"
      STORE_MESSAGES: "true"
      STORE_MESSAGE_UP: "true"
      STORE_CONTACTS: "true"
      STORE_CHATS: "true"

      # Webhook (não necessário para MVP)
      WEBHOOK_GLOBAL_ENABLED: "false"

      # QR Code no terminal (facilita autenticação)
      QRCODE_LIMIT: "30"
      QRCODE_COLOR: "#198754"

      # Log
      LOG_LEVEL: "ERROR"
      LOG_COLOR: "true"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  evolution_instances:
  evolution_store:
